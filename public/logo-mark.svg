<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none" role="img" aria-label="Zelcodes">
  <defs>
    <clipPath id="zc-clip"><circle cx="36" cy="36" r="26"/></clipPath>
    <filter id="zc-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="zc-halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <radialGradient id="zc-sheen" cx=".3" cy=".22" r=".72">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".65"/>
      <stop offset=".35" stop-color="#ffffff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="zc-rim" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".9"/>
      <stop offset=".45" stop-color="#ffffff" stop-opacity=".1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".6"/>
    </linearGradient>
    <radialGradient id="zc-inner" cx=".5" cy=".5" r=".5">
      <stop offset=".75" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity=".45"/>
    </radialGradient>
  </defs>

  <g filter="url(#zc-halo)" opacity=".55">
    <circle cx="24" cy="30" r="14" fill="#6366f1"/>
    <circle cx="48" cy="30" r="14" fill="#ec4899"/>
    <circle cx="36" cy="50" r="14" fill="#38bdf8"/>
  </g>

  <circle cx="36" cy="36" r="26" fill="#0b0b14"/>

  <g clip-path="url(#zc-clip)">
    <g filter="url(#zc-blur)">
      <circle cx="24" cy="24" r="18" fill="#6366f1"/>
      <circle cx="48" cy="28" r="17" fill="#ec4899"/>
      <circle cx="32" cy="52" r="18" fill="#38bdf8"/>
    </g>
    <circle cx="36" cy="36" r="26" fill="url(#zc-inner)"/>
  </g>

  <circle cx="36" cy="36" r="26" fill="url(#zc-sheen)"/>
  <circle cx="36" cy="36" r="26" fill="none" stroke="url(#zc-rim)" stroke-width="1.3"/>
  <ellipse cx="27" cy="22" rx="7" ry="3" fill="#ffffff" opacity=".45" transform="rotate(-30 27 22)"/>

  <circle cx="36" cy="6" r="7" fill="#ffffff" opacity=".22"/>
  <circle cx="36" cy="6" r="3.3" fill="#ffffff"/>
</svg>
