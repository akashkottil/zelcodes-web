<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <clipPath id="fc"><circle cx="32" cy="32" r="26"/></clipPath>
    <filter id="fb"><feGaussianBlur stdDeviation="5"/></filter>
    <radialGradient id="fs" cx=".3" cy=".22" r=".72">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".6"/>
      <stop offset=".4" stop-color="#ffffff" stop-opacity=".05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fp" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </radialGradient>
  </defs>

  <circle cx="32" cy="32" r="26" fill="#0b0b14"/>

  <g clip-path="url(#fc)">
    <g filter="url(#fb)">
      <circle cx="20" cy="22" r="16" fill="#6366f1">
        <animate attributeName="cx" values="20;40;26;20" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="22;18;44;22" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="44" cy="26" r="16" fill="#ec4899">
        <animate attributeName="cx" values="44;30;48;44" dur="9s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="26;46;30;26" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="48" r="16" fill="#38bdf8">
        <animate attributeName="cx" values="30;14;42;30" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="48;32;20;48" dur="10s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <circle cx="32" cy="32" r="26" fill="url(#fs)"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#ffffff" stroke-opacity=".5" stroke-width="1.2"/>

  <!-- Diagonal elliptical orbit ring -->
  <ellipse cx="32" cy="32" rx="28" ry="11" fill="none" stroke="#ffffff" stroke-opacity=".28" stroke-width="1" stroke-dasharray="2 3.5" transform="rotate(-30 32 32)"/>

  <!-- Orbiting photon on the same diagonal ellipse -->
  <g transform="translate(32 32) rotate(-30) scale(1 0.39)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="4.5s" repeatCount="indefinite"/>
      <circle cx="0" cy="-28" r="5" fill="#ffffff" opacity=".28"/>
      <circle cx="0" cy="-28" r="3" fill="url(#fp)"/>
      <circle cx="0" cy="-28" r="1.4" fill="#ffffff"/>
    </g>
  </g>
</svg>
